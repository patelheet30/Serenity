services:
  serenity:
    build: .                           # Tells Docker to use your Dockerfile
    container_name: serenity
    restart: unless-stopped
    env_file:
      - .env                           # Loads your secret Discord Token
    environment:
      - LOG_LEVEL=INFO                 # From your fly.toml
    ports:
      - "8080:8080"                    # Exposes your Prometheus metrics port
    volumes:
      - ./bot_data:/data               # Replaces your Fly volume mount
